name: sync-xidlc-package-manifests

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Stable xidlc release tag to sync manually"
        required: false
        type: string

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  sync:
    name: Sync Package Manifests
    if: github.repository_owner == 'xidl'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Python 3
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Resolve GitHub auth token
        id: resolve-token
        env:
          GH_TOKEN_OVERRIDE: ${{ secrets.GH_TOKEN }}
          DEFAULT_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [[ -n "${GH_TOKEN_OVERRIDE:-}" ]]; then
            echo "token=${GH_TOKEN_OVERRIDE}" >> "$GITHUB_OUTPUT"
            echo "source=gh_token_secret" >> "$GITHUB_OUTPUT"
          else
            echo "token=${DEFAULT_TOKEN}" >> "$GITHUB_OUTPUT"
            echo "source=github_token" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate package manager manifests
        env:
          GITHUB_TOKEN: ${{ steps.resolve-token.outputs.token }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          set -euo pipefail

          echo "Using auth source: ${{ steps.resolve-token.outputs.source }}"
          if [[ -n "${RELEASE_TAG:-}" ]]; then
            python3 scripts/sync-package-manifests.py --tag "$RELEASE_TAG"
          else
            python3 scripts/sync-package-manifests.py
          fi

      - name: Commit manifest updates
        env:
          PUSH_TOKEN: ${{ steps.resolve-token.outputs.token }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag }}
        run: |
          set -euo pipefail

          if git diff --quiet -- Formula packaging; then
            echo "Package manager manifests already up to date."
            exit 0
          fi

          commit_message="chore: sync xidlc package manager manifests"
          if [[ -n "${RELEASE_TAG:-}" ]]; then
            commit_message="${commit_message} for ${RELEASE_TAG}"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          git add Formula packaging
          git commit -m "${commit_message}"
          git push origin "${{ github.event.repository.default_branch }}"
